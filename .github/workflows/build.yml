name: Playwright Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build-docs:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Build Storybook
        run: npm run build-storybook
      - name: Upload Docs Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/current
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.pw.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: pw
        run: |
          VERSION=$(jq -r '.devDependencies."@playwright/test"' package.json | sed 's/^[~^]//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Playwright version: $VERSION"

  tests-e2e:
    needs: setup
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get Playwright version and run tests
        run: |
          # Извлекаем версию из package.json
          PLAYWRIGHT_VERSION=$(jq -r '.devDependencies."@playwright/test"' package.json | sed 's/^[~^]//')
          echo "Detected Playwright version: $PLAYWRIGHT_VERSION"

          # Запускаем Docker с правильной версией
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-noble \
            sh -c "npm ci && npm run lint && npx playwright test"
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  tests-jest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Run test
        run: npm test
  deploy-pages:
    needs: [build-docs, tests-e2e, tests-jest]
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
