name: Playwright Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build-docs:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Build Storybook
        run: npm run build-storybook
      - name: Upload Docs Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/current
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.pw.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: pw
        run: |
          VERSION=$(jq -r '.devDependencies."@playwright/test"' package.json | sed 's/^[~^]//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Playwright version: $VERSION"

  tests-e2e:
    needs: setup
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v${{ needs.setup.outputs.version }}-noble
    steps:
      - uses: actions/checkout@v4
      #- uses: actions/setup-node@v4
      #  with:
      #    node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Check lint and format
        run: npm run lint
      #- name: Clear and update apt mirrors
      #  run: sudo apt-get clean && sudo apt-get update
      #- name: Install Playwright Browsers
      #  run: npx playwright install --with-deps
      - name: Run Playwright tests with unbuffered output
        run: |
          node -e "process.stdout._handle.setBlocking(true)" && npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
  tests-jest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Run test
        run: npm test
  deploy-pages:
    needs: [build-docs, tests-e2e, tests-jest]
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
